# lychee.toml

# Network-resilience tuning. The link checker has historically failed CI on
# transient TLS / DNS / connection blips against well-known live sites
# (e.g. https://opentelemetry.io/ — a TLS handshake failure took down the
# build-site job in https://github.com/valkey-io/valkey-glide-docs/actions/runs/26177649882).
#
#   max_retries     — how many times lychee retries a single URL on a network error.
#   retry_wait_time — seconds to wait between those retries (default is 1s, which
#                     is too aggressive when an upstream TLS endpoint is briefly
#                     misbehaving).
#   timeout         — per-request network timeout in seconds.
#
# With these values lychee will spend up to ~7 minutes retrying a single URL
# before giving up, instead of giving up after ~93 seconds. The CI workflow
# *also* retries the whole step once on top of this, so a real broken link
# still fails the build promptly while a transient network issue doesn't.
max_retries     = 6
retry_wait_time = 10
timeout         = 60

# Exclude specific URLs/links (RegEx)
exclude = [
    # GitHub edit links
    'https://github\.com/valkey-io/valkey-glide-docs/edit/.*',

    # When adding a new page, it would not be live when Lychee checks the links. 
    # It will return error, blocking both PR and deployment workflows.
    # We ignore the live URL to get around this. Also, any internal links should use absolute url which 
    # are still checked by Lychee.
    'https://glide.valkey.io/.*',

    # API docs are deployed separately and don't exist in the build output
    '.*/languages/java/api.*',
    '.*/languages/nodejs/api.*',
    '.*/languages/python/api.*',

    # Slack invite links return 403 to automated checkers
    'https://join\.slack\.com/.*',

    # Broken upstream links in generated API docs (cannot fix until upstream is updated)
    'https://valkey\.io/commands/echo/%3Evalkey\.io%3C/a%3E%20for%20details\.%3C/dd%3E%3Cdt%3E%3Cspan%20class=',
    'https://valkey\.io/commands/echo/%3Evalkey\.io%3C/a%3E%20for%20details\.%3C/dd%3E%3C/dl%3E%3C/li%3E%3C/ul%3E%3Ca%20id=',
    'https://valkey\.io/docs/commands/randomkey/',
    'https://valkey\.io/docs/latest/commands/sinter/',
    'https://valkey\.io/docs/latest/commands/function-dump/',
    'https://valkey\.io/docs/latest/commands/function-restore/',
]
